apiVersion: 1

datasources:
  - name: PostgreSQL
    type: postgres
    uid: nanorca-postgres
    url: postgres:5432
    database: ${POSTGRES_DB}
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 3
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: true
    editable: false
