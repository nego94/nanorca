# NANORCA — Docker Compose (production + local)

# ── NANORCA — Docker Compose ────────────────────────────────────────────────
# Services: executor (Go), bot (Python), postgres, prometheus, grafana
# Internal gRPC between executor and bot on the 'nanorca' network.
# Only Grafana (3000) and bot metrics (8080/8081) are externally exposed.
# PostgreSQL is NEVER exposed externally — internal network only.

networks:
  nanorca:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

services:

  # ── Go executor (hot paths) ───────────────────────────────────────────────
  executor:
    build:
      context: ./executor
      dockerfile: Dockerfile
    container_name: nanorca_executor
    restart: unless-stopped
    env_file: .env
    networks:
      - nanorca
    ports:
      - "50051:50051"   # gRPC — internal only, exposed for debug; lock down on prod
    environment:
      - EXECUTOR_GRPC_PORT=50051
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  # ── Python brain (AI, Telegram, learning, risk) ───────────────────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: nanorca_bot
    restart: unless-stopped
    env_file: .env
    networks:
      - nanorca
    ports:
      - "8080:8080"   # Prometheus /metrics
      - "8081:8081"   # Health check /health
    environment:
      - EXECUTOR_GRPC_HOST=executor
      - EXECUTOR_GRPC_PORT=50051
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      executor:
        condition: service_healthy

  # ── PostgreSQL + TimescaleDB ──────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: nanorca_postgres
    restart: unless-stopped
    networks:
      - nanorca
    # NO external port — internal only
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: nanorca_prometheus
    restart: unless-stopped
    networks:
      - nanorca
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  # ── NANORCA Dashboard (Next.js) ───────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: nanorca_dashboard
    restart: unless-stopped
    networks:
      - nanorca
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      - postgres

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: nanorca_grafana
    restart: unless-stopped
    networks:
      - nanorca
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      # Passed so the postgres datasource provisioning YAML can resolve them
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
